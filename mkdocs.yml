      - '自定义工况原理': 'explanation/tricys_basic/fusion_operation_principle.md'
      - '协同仿真原理': 'explanation/tricys_basic/co_simulation.md'
      - 'RPC Worker架构': 'explanation/tricys_basic/rpc_worker_architecture.md'
