  - '入门指南':
    - '快速开始': 'guides/quickstart.md'
    - '模型概述':
      - '氚燃料循环0维系统模型': 'guides/models/cycle.md'
    - '基础仿真（TRICYS BASIC）': 
      - '基础配置': 'guides/tricys_basic/basic_configuration.md'
      - '自定义工况配置': 'guides/tricys_basic/fusion_operation_config.md'
      - '参数扫描': 'guides/tricys_basic/parameter_sweep.md'
      - '并发运行': 'guides/tricys_basic/concurrent_operation.md'
      - '后处理模块': 'guides/tricys_basic/post_processing_module.md'
