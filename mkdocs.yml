site_name: TRitium Integrated CYcle Simulation

repo_url: "https://github.com/asipp-neutronics/tricys"
repo_name: "TRICYS"

dev_addr: '127.0.0.1:18000'

theme:
  name: material
  language: "en"
  icon:
    repo: fontawesome/brands/git-alt
  palette:
    # 浅色模式
    - scheme: default
      primary: blue
      accent: deep-orange

  features:
    - navigation.sections
    - navigation.footer
    - navigation.top
    - search.highlight
    - search.suggest
    - navigation.tabs
    - content.code.copy
    - content.code.annotate


markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - toc:
      permalink: true
  - attr_list
  - pymdownx.tabbed:
      alternate_style: true 
  - md_in_html
  - pymdownx.details    
  - pymdownx.superfences 

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            paths: [ "." ]

  - i18n:
      docs_structure: folder
      default_language: "en"
      fallback_to_default: true
      languages:
        - locale: en
          name: English
          build: true
          default: true
          link: '/tricys/'
          nav_translations:
            # 顶层
            '主页': 'Home'
            '入门指南': 'Getting Started'
            '常见问题': 'FAQ'
            'API 参考': 'API Reference'
            '原理解说': 'Explanation'
            '更新日志': 'Changelog'
            '开源许可': 'License'
            
            '氚燃料循环0维系统模型': 'Tritium Fuel Cycle 0D System Model'

            # “入门指南”的子项
            '快速开始': 'Quick Start'
            '模型概述': 'Model Overview'
            '基础仿真（TRICYS BASIC）': 'Basic Simulation (TRICYS BASIC)'
            '自动分析（TRICYS ANALYSIS)': 'Automated Analysis (TRICYS ANALYSIS)'

            # “基础仿真”的子项
            '基础配置': 'Basic Configuration'
            '自定义工况': 'Fusion Operation Configuration'
            '参数扫描': 'Parameter Sweep'
            '并发运行': 'Concurrent Operation' 
            '后处理模块': 'Post-processing Module'
            '协同仿真模块': 'Co-simulation Module'

            # “自动分析”的子项
            '通用介绍': 'Introduction & Common Config'
            '基准工况分析': 'Baseline Condition Analysis'
            '单参数敏感性分析': 'Single Parameter Sensitivity Analysis'
            '多参数敏感性分析': 'Multi-parameter Sensitivity Analysis'
            'SOBOL全局敏感性分析': 'SOBOL Global Sensitivity Analysis'
            'Latin不确定性量化分析': 'Latin Uncertainty Analysis'

            # “常见问题”的子项
            '🚀 安装环境': '🚀 Installation & Environment'
            '⚙️ 配置运行': '⚙️ Configuration & Execution'
            '🔬 高级功能': '🔬 Advanced Features'
            '🐛 故障排除': '🐛 Troubleshooting'
            '💡 最佳实践': '💡 Best Practices'

            # “原理解说”的子项
            '系统架构设计': 'System Architecture'
            '仿真执行流程': 'Simulation Flow'
            '自定义工况规则': 'Fusion Operation Principle'
            '协同仿真原理': 'Co-simulation Principle'
            'RPC Worker架构': 'RPC Worker Architecture'
            '并发计算模式': 'Concurrency Model'
            '自动分析流程': 'Analysis Flow'
            '生成分析报告': 'Generating Analysis Reports'
            'SALIB集成方法': 'SALIB Integration Methods'
            '核心性能指标': 'Core Performance Metrics'

        - locale: zh
          name: 简体中文
          build: true
          link: '/tricys/zh/'
          site_name: "氚燃料循环集成仿真平台"
  - offline

nav:
