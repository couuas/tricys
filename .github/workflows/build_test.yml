name: HDF5 Image Build Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    types: [opened, reopened, synchronize]
  workflow_dispatch:

jobs:
  build-test:
    name: Build tricys-hdf5 image and run pytest -m build_test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build tricys-hdf5 image
        run: docker build -f docker/dockerfiles/Dockerfile.hdf5 -t tricys-build-test:hdf5 .

      - name: Run pytest -m build_test inside tricys-hdf5 image
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            --entrypoint bash \
            tricys-build-test:hdf5 \
            -lc 'python3 -m pip install -r requirements.txt pytest && PYTHONPATH=/workspace python3 -m pytest -v -m build_test test'

      - name: Debug with tmate on failure
        if: failure()
        uses: mxschmitt/action-tmate@v3

