name: Build & Publish TRICYS Images

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
    paths:
      - '.dockerignore'
      - 'docker-compose.yml'
      - 'docker/*'
      - 'pyproject.toml'
      - 'README.md'
      - 'README_zh.md'
      - 'script/modelica_install/**'
      - 'tricys/**'
      - 'tricys_backend'
      - 'tricys_backend/**'
      - 'tricys_visual'
      - 'tricys_visual/**'
      - 'tricys_goview'
      - 'tricys_goview/**'
      - '.gitmodules'
      - '.github/workflows/docker_publish.yml'

env:
  TRICYS_IMAGE: ghcr.io/${{ github.repository_owner }}/tricys
  TRICYS_HDF5_IMAGE: ghcr.io/${{ github.repository_owner }}/tricys-hdf5
  TRICYS_GOVIEW_BRANCH: main

jobs:
  build-and-push:
    name: Publish ${{ matrix.name }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: tricys-runtime
            image: ghcr.io/${{ github.repository_owner }}/tricys
            dockerfile: docker/dockerfiles/Dockerfile
            target: tricys_runtime
            cache_scope: tricys-runtime
            build_args: |
              VITE_API_URL=/api/v1
              VITE_API_V2_URL=/api/v2/goview
              VITE_GOVIEW_URL=/goview/
              VITE_PRO_PATH=
          - name: tricys-hdf5
            image: ghcr.io/${{ github.repository_owner }}/tricys-hdf5
            dockerfile: docker/dockerfiles/Dockerfile.hdf5
            target: ""
            cache_scope: tricys-hdf5
            build_args: ""

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Sync tricys_goview branch
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive
          git -C tricys_goview fetch origin ${TRICYS_GOVIEW_BRANCH}
          if git -C tricys_goview rev-parse --verify ${TRICYS_GOVIEW_BRANCH} >/dev/null 2>&1; then
            git -C tricys_goview checkout ${TRICYS_GOVIEW_BRANCH}
          else
            git -C tricys_goview checkout -b ${TRICYS_GOVIEW_BRANCH} --track origin/${TRICYS_GOVIEW_BRANCH}
          fi
          git -C tricys_goview pull --ff-only origin ${TRICYS_GOVIEW_BRANCH}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push ${{ matrix.name }} image
        if: matrix.target != ''
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache_scope }}

      - name: Build and push ${{ matrix.name }} image
        if: matrix.target == ''
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache_scope }}