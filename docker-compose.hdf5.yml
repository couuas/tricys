services:
  tricys-hdf5-dev:
    build:
      context: .
      dockerfile: ./docker/dockerfiles/Dockerfile.hdf5
    image: ${TRICYS_HDF5_IMAGE:-ghcr.io/asipp-neutronics/tricys-hdf5:latest}
    init: true
    environment:
      HDF5_VISUALIZER_SECRET: ${TRICYS_HDF5_VISUALIZER_SECRET:-change-me-before-production}
      HDF5_VISUALIZER_BASE_URL: ${TRICYS_HDF5_VISUALIZER_BASE_URL:-/hdf5/}
      HDF5_VISUALIZER_TOKEN_TTL_SECONDS: ${TRICYS_HDF5_VISUALIZER_TOKEN_TTL_SECONDS:-900}
      HDF5_CONTEXTS_DIR: ${TRICYS_HDF5_CONTEXTS_DIR:-/data/hdf5_contexts}
      HDF5_VISUALIZER_PORT: ${TRICYS_HDF5_PORT:-8050}
    ports:
      - "${TRICYS_HDF5_PORT:-8050}:8050"
    volumes:
      - ./:/workspace
      - tricys_hdf5_dev_state:/data
    working_dir: /workspace
    tty: true
    stdin_open: true
    healthcheck:
      test: ["CMD", "sh", "-lc", "curl -fsS http://127.0.0.1:${TRICYS_HDF5_PORT:-8050}${TRICYS_HDF5_VISUALIZER_BASE_URL:-/hdf5/}health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  tricys_hdf5_dev_state:
